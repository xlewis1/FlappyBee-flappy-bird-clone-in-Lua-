<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, minimum-scale=1, maximum-scale=1">
    <title>Flappy Bee</title>
    <link rel="stylesheet" type="text/css" href="theme/love.css">
  </head>
  <body>
    <center>
      <div>
        <h1>Flappy Bee</h1>
        <canvas id="loadingCanvas" width="800" height="600"></canvas>
        <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
      </div>
    </center>
    <script type='text/javascript'>
      var Module = {
        arguments: ["./game.data"],
        INITIAL_MEMORY: 16777216,
        printErr: console.error.bind(console),
        canvas: document.getElementById('canvas'),
        setStatus: function(text) {
          if (!text && Module.remainingDependencies === 0) {
            document.getElementById('loadingCanvas').style.display = 'none';
            document.getElementById('canvas').style.visibility = 'visible';
          }
        },
        totalDependencies: 0,
        remainingDependencies: 0,
        monitorRunDependencies: function(left) {
          this.remainingDependencies = left;
        }
      };
      var applicationLoad = function(e) { Love(Module); }
    </script>
    <script type="text/javascript" src="game.js"></script>
    <script async type="text/javascript" src="love-safe.js" onload="applicationLoad(this)"></script>
  </body>
</html>
